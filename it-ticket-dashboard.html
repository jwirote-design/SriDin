<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แดชบอร์ดตั๋วสนับสนุน IT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }
    header .icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.4px; }
    header p  { font-size: 0.82rem; color: #64748b; margin-top: 2px; }

    /* ── Summary Cards ── */
    .summary-group { margin-bottom: 28px; }
    .summary-group h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 12px;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .card {
      flex: 1 1 130px;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: transform .15s, box-shadow .15s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px #0006; }
    .card .label { font-size: 0.78rem; color: #94a3b8; }
    .card .count { font-size: 2rem; font-weight: 700; line-height: 1; }
    .card .bar   { height: 3px; border-radius: 2px; margin-top: 4px; }

    /* Priority colours */
    .high   .count { color: #f87171; }
    .high   .bar   { background: #f87171; }
    .medium .count { color: #fb923c; }
    .medium .bar   { background: #fb923c; }
    .low    .count { color: #4ade80; }
    .low    .bar   { background: #4ade80; }

    /* Status colours */
    .open       .count { color: #60a5fa; }
    .open       .bar   { background: #60a5fa; }
    .inprogress .count { color: #facc15; }
    .inprogress .bar   { background: #facc15; }
    .resolved   .count { color: #34d399; }
    .resolved   .bar   { background: #34d399; }

    /* ── Table Section ── */
    .table-section { background: #1e2130; border: 1px solid #2d3148; border-radius: 16px; overflow: hidden; }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid #2d3148;
    }
    .table-header h2 { font-size: 0.95rem; font-weight: 600; }
    .table-header span { font-size: 0.78rem; color: #64748b; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead th {
      background: #161825;
      padding: 11px 16px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #64748b;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      transition: color .15s;
    }
    thead th:hover { color: #c7d2fe; }
    thead th .sort-icon { margin-left: 4px; opacity: 0.4; font-style: normal; }
    thead th.asc  .sort-icon::after { content: ' ▲'; opacity: 1; color: #818cf8; }
    thead th.desc .sort-icon::after { content: ' ▼'; opacity: 1; color: #818cf8; }
    thead th:not(.asc):not(.desc) .sort-icon::after { content: ' ⇅'; }

    tbody tr {
      border-top: 1px solid #252840;
      transition: background .12s;
    }
    tbody tr:hover { background: #252840; }
    td { padding: 12px 16px; vertical-align: middle; }

    .ticket-id   { font-family: monospace; color: #818cf8; font-size: 0.8rem; }
    .ticket-title { font-weight: 500; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .badge-high       { background: #7f1d1d; color: #fca5a5; }
    .badge-medium     { background: #7c2d12; color: #fdba74; }
    .badge-low        { background: #14532d; color: #86efac; }
    .badge-open       { background: #1e3a5f; color: #93c5fd; }
    .badge-inprogress { background: #713f12; color: #fde047; }
    .badge-resolved   { background: #064e3b; color: #6ee7b7; }

    .assignee { color: #cbd5e1; }
    .date     { color: #64748b; font-size: 0.8rem; white-space: nowrap; }
  </style>
</head>
<body>

<header>
  <div class="icon">🎫</div>
  <div>
    <h1>แดชบอร์ดตั๋วสนับสนุน IT</h1>
    <p>ระบบติดตามและจัดการคำร้องขอสนับสนุนด้านไอที</p>
  </div>
</header>

<!-- Priority Summary -->
<div class="summary-group">
  <h2>สรุปตามระดับความสำคัญ</h2>
  <div class="cards">
    <div class="card high">
      <span class="label">สูง (High)</span>
      <span class="count" id="cnt-high">0</span>
      <div class="bar"></div>
    </div>
    <div class="card medium">
      <span class="label">ปานกลาง (Medium)</span>
      <span class="count" id="cnt-medium">0</span>
      <div class="bar"></div>
    </div>
    <div class="card low">
      <span class="label">ต่ำ (Low)</span>
      <span class="count" id="cnt-low">0</span>
      <div class="bar"></div>
    </div>
  </div>
</div>

<!-- Status Summary -->
<div class="summary-group">
  <h2>สรุปตามสถานะ</h2>
  <div class="cards">
    <div class="card open">
      <span class="label">เปิด (Open)</span>
      <span class="count" id="cnt-open">0</span>
      <div class="bar"></div>
    </div>
    <div class="card inprogress">
      <span class="label">กำลังดำเนินการ</span>
      <span class="count" id="cnt-inprogress">0</span>
      <div class="bar"></div>
    </div>
    <div class="card resolved">
      <span class="label">แก้ไขแล้ว</span>
      <span class="count" id="cnt-resolved">0</span>
      <div class="bar"></div>
    </div>
  </div>
</div>

<!-- Ticket Table -->
<div class="table-section">
  <div class="table-header">
    <h2>รายการตั๋วทั้งหมด</h2>
    <span id="total-label"></span>
  </div>
  <div class="table-wrap">
    <table id="ticket-table">
      <thead>
        <tr>
          <th data-col="id">รหัส<i class="sort-icon"></i></th>
          <th data-col="title">หัวข้อ<i class="sort-icon"></i></th>
          <th data-col="priority">ระดับความสำคัญ<i class="sort-icon"></i></th>
          <th data-col="status">สถานะ<i class="sort-icon"></i></th>
          <th data-col="assignedTo">ผู้รับผิดชอบ<i class="sort-icon"></i></th>
          <th data-col="createdDate">วันที่สร้าง<i class="sort-icon"></i></th>
        </tr>
      </thead>
      <tbody id="ticket-tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const tickets = [
    { id: 'INC-0001', title: 'อีเมลใช้งานไม่ได้หลังอัปเดตระบบ',         priority: 'High',   status: 'Open',        assignedTo: 'สมชาย ใจดี',      createdDate: '2026-03-28' },
    { id: 'INC-0002', title: 'เครื่องพิมพ์ในชั้น 3 ไม่ตอบสนอง',          priority: 'Medium', status: 'In Progress', assignedTo: 'นภา รักงาน',      createdDate: '2026-03-29' },
    { id: 'INC-0003', title: 'VPN เชื่อมต่อไม่ได้จากที่บ้าน',            priority: 'High',   status: 'In Progress', assignedTo: 'วิชัย มั่นคง',    createdDate: '2026-03-30' },
    { id: 'INC-0004', title: 'ลืมรหัสผ่านเข้าระบบ ERP',                  priority: 'Low',    status: 'Resolved',    assignedTo: 'สุดา พร้อมช่วย',  createdDate: '2026-03-30' },
    { id: 'INC-0005', title: 'หน้าจอค้างระหว่างประมวลผลรายงาน',          priority: 'High',   status: 'Open',        assignedTo: 'ประเสริฐ เก่งงาน', createdDate: '2026-03-31' },
    { id: 'INC-0006', title: 'ไฟล์แชร์ไดรฟ์เข้าไม่ได้',                  priority: 'Medium', status: 'Resolved',    assignedTo: 'นภา รักงาน',      createdDate: '2026-04-01' },
    { id: 'INC-0007', title: 'ขอติดตั้งโปรแกรม Adobe Acrobat',            priority: 'Low',    status: 'Open',        assignedTo: 'สมชาย ใจดี',      createdDate: '2026-04-01' },
    { id: 'INC-0008', title: 'ระบบสแกนลายนิ้วมือหน้าประตูทำงานผิดปกติ',  priority: 'High',   status: 'In Progress', assignedTo: 'วิชัย มั่นคง',    createdDate: '2026-04-02' },
    { id: 'INC-0009', title: 'ขอเพิ่มสิทธิ์เข้าถึงฐานข้อมูลการเงิน',     priority: 'Medium', status: 'Open',        assignedTo: 'ประเสริฐ เก่งงาน', createdDate: '2026-04-03' },
    { id: 'INC-0010', title: 'โน้ตบุ๊กแบตเตอรี่เสื่อมสภาพ ชาร์จไม่ติด',  priority: 'Low',    status: 'Resolved',    assignedTo: 'สุดา พร้อมช่วย',  createdDate: '2026-04-04' },
  ];

  // ── Count summaries ──────────────────────────────────────
  const priorityMap = { High: 0, Medium: 0, Low: 0 };
  const statusMap   = { Open: 0, 'In Progress': 0, Resolved: 0 };
  tickets.forEach(t => { priorityMap[t.priority]++; statusMap[t.status]++; });

  document.getElementById('cnt-high').textContent      = priorityMap.High;
  document.getElementById('cnt-medium').textContent    = priorityMap.Medium;
  document.getElementById('cnt-low').textContent       = priorityMap.Low;
  document.getElementById('cnt-open').textContent      = statusMap.Open;
  document.getElementById('cnt-inprogress').textContent = statusMap['In Progress'];
  document.getElementById('cnt-resolved').textContent  = statusMap.Resolved;
  document.getElementById('total-label').textContent   = `ทั้งหมด ${tickets.length} รายการ`;

  // ── Badge helpers ─────────────────────────────────────────
  const priorityLabel = { High: 'สูง',        Medium: 'ปานกลาง', Low: 'ต่ำ' };
  const statusLabel   = { Open: 'เปิด', 'In Progress': 'กำลังดำเนินการ', Resolved: 'แก้ไขแล้ว' };
  const priorityClass = { High: 'badge-high', Medium: 'badge-medium', Low: 'badge-low' };
  const statusClass   = { Open: 'badge-open', 'In Progress': 'badge-inprogress', Resolved: 'badge-resolved' };

  const priorityOrder = { High: 0, Medium: 1, Low: 2 };
  const statusOrder   = { Open: 0, 'In Progress': 1, Resolved: 2 };

  // ── Sorting state ─────────────────────────────────────────
  let sortCol = 'id', sortDir = 'asc';

  function getValue(ticket, col) {
    if (col === 'priority') return priorityOrder[ticket.priority];
    if (col === 'status')   return statusOrder[ticket.status];
    return ticket[col] ?? '';
  }

  function renderTable() {
    const sorted = [...tickets].sort((a, b) => {
      const va = getValue(a, sortCol);
      const vb = getValue(b, sortCol);
      const cmp = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb), 'th');
      return sortDir === 'asc' ? cmp : -cmp;
    });

    const tbody = document.getElementById('ticket-tbody');
    tbody.innerHTML = sorted.map(t => `
      <tr>
        <td class="ticket-id">${t.id}</td>
        <td class="ticket-title">${t.title}</td>
        <td><span class="badge ${priorityClass[t.priority]}">${priorityLabel[t.priority]}</span></td>
        <td><span class="badge ${statusClass[t.status]}">${statusLabel[t.status]}</span></td>
        <td class="assignee">${t.assignedTo}</td>
        <td class="date">${t.createdDate}</td>
      </tr>
    `).join('');
  }

  // ── Header click → sort ───────────────────────────────────
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortDir = 'asc';
      }
      document.querySelectorAll('thead th').forEach(h => h.classList.remove('asc', 'desc'));
      th.classList.add(sortDir);
      renderTable();
    });
  });

  // initial render with ID column marked
  document.querySelector('thead th[data-col="id"]').classList.add('asc');
  renderTable();
</script>
</body>
</html>
